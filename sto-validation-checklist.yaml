sto_validation_checklist:
  version: "1.0"
  description: "Чек-лист для автоматической и ручной валидации готового СТО на соответствие СТО 31025229-001-2024 и корпоративному стилю СТО 002/003/004/005/007/010/012."
  sections:
    - name: "Титульный лист"
      items:
        - id: "TL-01"
          description: "На титульном листе присутствует блок «УТВЕРЖДАЮ»."
          required: true
          check: "AUTO: поиск текста '^УТВЕРЖДАЮ$' в верхней части первой страницы."
          severity: "error"
        - id: "TL-02"
          description: "Указана должность утверждающего лица."
          required: true
          check: "AUTO: в зоне блока утверждения найдена строка с должностью; MANUAL: должность соответствует шаблону организации."
          severity: "error"
        - id: "TL-03"
          description: "Указано наименование организации (ООО «ПКФ «СНАРК» или актуальное юридическое наименование)."
          required: true
          check: "AUTO: строка с названием организации найдена на титульной странице."
          severity: "error"
        - id: "TL-04"
          description: "Указано обозначение СТО в формате семейства 31025229-XXX-YYYY."
          required: true
          check: "AUTO: regex '(СТО\\s*)?31025229[-–]\\d{3}[-–]\\d{4}' найден на титульной странице."
          severity: "error"
        - id: "TL-05"
          description: "Присутствует надпись «СТАНДАРТ ОРГАНИЗАЦИИ»."
          required: true
          check: "AUTO: найден текст '^СТАНДАРТ ОРГАНИЗАЦИИ$'."
          severity: "error"
        - id: "TL-06"
          description: "Присутствует строка «Система менеджмента качества» или эквивалентный контекст СМК."
          required: true
          check: "AUTO: найден текст, содержащий 'Система менеджмента качества'."
          severity: "warning"
        - id: "TL-07"
          description: "Указан статус введения: «Введен впервые» или «Взамен СТО ...»."
          required: true
          check: "AUTO: найден один из маркеров ('Введен впервые' | 'Взамен СТО')."
          severity: "error"
        - id: "TL-08"
          description: "Присутствует блок «Введен в действие Приказом»."
          required: true
          check: "AUTO: найден текст 'Введен в действие Приказом'."
          severity: "error"
        - id: "TL-09"
          description: "Указаны реквизиты приказа: дата и номер."
          required: true
          check: "AUTO: рядом с блоком ввода найден шаблон 'от ... № ...'; MANUAL: значения заполнены для утвержденной версии."
          severity: "error"
        - id: "TL-10"
          description: "Указана дата введения в действие."
          required: true
          check: "AUTO: найден текст 'Дата введения'; MANUAL: дата заполнена для утвержденного документа."
          severity: "error"
        - id: "TL-11"
          description: "На титульном листе отсутствует номер страницы."
          required: true
          check: "AUTO: футер первой страницы не содержит номер страницы."
          severity: "error"
        - id: "TL-12"
          description: "На титульном листе отсутствует верхний колонтитул с регистрационным номером."
          required: true
          check: "AUTO: верхний колонтитул первой страницы пуст."
          severity: "error"

    - name: "Содержание"
      items:
        - id: "TOC-01"
          description: "Раздел «Содержание» присутствует в документе."
          required: true
          check: "AUTO: найден заголовок '^Содержание$'."
          severity: "error"
        - id: "TOC-02"
          description: "В содержании перечислены все обязательные разделы СТО."
          required: true
          check: "AUTO: сравнить список заголовков в содержании со списком обязательных разделов."
          severity: "error"
        - id: "TOC-03"
          description: "В содержании перечислены приложения."
          required: true
          check: "AUTO: в блоке содержания найдены строки, начинающиеся с 'Приложение'."
          severity: "error"
        - id: "TOC-04"
          description: "В содержании присутствуют листы регистрации изменений, ознакомления и согласования."
          required: true
          check: "AUTO: в содержании найдены строки 'Лист регистрации изменений', 'Лист ознакомления', 'Лист согласования'."
          severity: "error"
        - id: "TOC-05"
          description: "Для элементов содержания указаны номера страниц."
          required: true
          check: "AUTO: в строках содержания найден завершающий номер страницы."
          severity: "warning"
        - id: "TOC-06"
          description: "Порядок разделов в содержании совпадает с фактическим порядком в документе."
          required: true
          check: "AUTO: сравнить индекс позиции заголовков в TOC и в теле документа."
          severity: "error"

    - name: "Область применения"
      items:
        - id: "AR-01"
          description: "Раздел «Область применения» присутствует."
          required: true
          check: "AUTO: найден заголовок 'Область применения' (с номером или без)."
          severity: "error"
        - id: "AR-02"
          description: "В разделе указано назначение стандарта."
          required: true
          check: "AUTO: найден один из шаблонов ('Настоящий стандарт устанавливает' | 'Настоящий стандарт распространяется'); MANUAL: подтверждение смысловой полноты."
          severity: "error"
        - id: "AR-03"
          description: "В разделе указана область распространения/применимости стандарта."
          required: true
          check: "AUTO: найдены маркеры области действия ('обязателен для применения' | 'распространяется на'); MANUAL: проверка полноты перечня."
          severity: "error"
        - id: "AR-04"
          description: "Формулировка соответствует нормативному стилю СТО 001 («Настоящий стандарт устанавливает.../распространяется...»)."
          required: false
          check: "AUTO: ключевые фразы обнаружены; MANUAL: смысл полностью соблюден."
          severity: "warning"

    - name: "Нормативные ссылки"
      items:
        - id: "NR-01"
          description: "Раздел «Нормативные ссылки» присутствует."
          required: true
          check: "AUTO: найден заголовок 'Нормативные ссылки'."
          severity: "error"
        - id: "NR-02"
          description: "Раздел содержит вводную формулу о нормативных ссылках."
          required: true
          check: "AUTO: найден текст вида 'В настоящем стандарте ... использованы нормативные ссылки'."
          severity: "error"
        - id: "NR-03"
          description: "В списке ссылок присутствует СТО 31025229-001-2024."
          required: true
          check: "AUTO: в разделе найдено обозначение '31025229-001-2024' или с длинным тире."
          severity: "error"
        - id: "NR-04"
          description: "Ссылочные документы представлены с идентификатором, годом и названием."
          required: true
          check: "AUTO: для каждой строки ссылки обнаружены идентификатор документа, год и текст наименования."
          severity: "error"
        - id: "NR-05"
          description: "В тексте основной части нет ссылок на документы, отсутствующие в разделе нормативных ссылок."
          required: true
          check: "AUTO: извлечь ссылки по regex (ГОСТ/СТО/Приказ) и сравнить с разделом 2."
          severity: "error"
        - id: "NR-06"
          description: "Ссылочные документы в тексте основной части указываются без года, если это требуется правилами СТО 001."
          required: false
          check: "AUTO: в теле проверить отсутствие года в ссылках; MANUAL: исключения обоснованы."
          severity: "info"
        - id: "NR-07"
          description: "Для утвержденных документов отсутствуют явно неактуальные/отмененные ссылки без пояснений."
          required: false
          check: "AUTO: обнаружить маркеры 'утратил силу/отменен' без пояснений; MANUAL: внешняя правовая проверка при необходимости."
          severity: "warning"
        - id: "NR-08"
          description: "В нормативных ссылках отсутствуют пустые строки-элементы и дубли ссылок."
          required: true
          check: "AUTO: список ссылок не содержит пустых элементов; нормализованные идентификаторы уникальны."
          severity: "error"
        - id: "NR-09"
          description: "Формат обозначения ссылок единообразен (единый тип тире/разделителей в пределах документа)."
          required: true
          check: "AUTO: в идентификаторах ссылок используется единый стиль разделителя ('-' или '–') без хаотичного смешения."
          severity: "warning"
        - id: "NR-10"
          description: "Раздел нормативных ссылок расположен перед разделом терминов."
          required: true
          check: "AUTO: индекс раздела 'Нормативные ссылки' меньше индекса раздела 'Термины...'."
          severity: "error"
        - id: "NR-11"
          description: "В ссылках отсутствуют нераспознанные/поврежденные реквизиты (ошибочные символы, битые номера)."
          required: true
          check: "AUTO: строки ссылок проходят базовую валидацию символов и шаблонов номера документа."
          severity: "warning"

    - name: "Термины, определения и сокращения"
      items:
        - id: "TERM-01"
          description: "Раздел терминов/определений присутствует."
          required: true
          check: "AUTO: найден заголовок 'Термины, определения и сокращения' или эквивалентный ('Определения и сокращения')."
          severity: "error"
        - id: "TERM-02"
          description: "Раздел содержит вводную формулу о примененных терминах."
          required: true
          check: "AUTO: найдена вводная фраза 'В настоящем стандарте ... применены следующие термины...'."
          severity: "error"
        - id: "TERM-03"
          description: "Термины оформлены как пары «термин: определение»."
          required: true
          check: "AUTO: в разделе найдены строки с шаблоном '<термин>: <определение>'."
          severity: "warning"
        - id: "TERM-04"
          description: "Сокращения вынесены в список с расшифровкой."
          required: true
          check: "AUTO: найден подблок сокращений и строки вида 'ABC – расшифровка'."
          severity: "warning"
        - id: "TERM-05"
          description: "При большом количестве сокращений (более 5) сокращения выделены отдельным структурным блоком."
          required: false
          check: "AUTO: если количество сокращений > 5, то присутствует явный подзаголовок/подраздел сокращений."
          severity: "info"
        - id: "TERM-06"
          description: "Термины и сокращения консистентно используются в основной части."
          required: false
          check: "AUTO: выборочная проверка вхождений терминов/сокращений в теле; MANUAL: контекстная корректность."
          severity: "info"

    - name: "Основная часть (разделы 4 и далее)"
      items:
        - id: "MAIN-01"
          description: "Основная часть присутствует, начиная с раздела 4 или эквивалентной структуры после обязательных вводных разделов."
          required: true
          check: "AUTO: обнаружен раздел 4 или первый предметный раздел после терминов."
          severity: "error"
        - id: "MAIN-02"
          description: "Разделы и подразделы имеют иерархическую нумерацию без пропусков на одном уровне."
          required: true
          check: "AUTO: построить дерево номеров (4, 4.1, 4.1.1...) и проверить дубли/пропуски."
          severity: "error"
        - id: "MAIN-03"
          description: "Каждый раздел содержит предметное описание процесса/правил, а не только заголовок."
          required: true
          check: "AUTO: после каждого заголовка найдено не менее N символов текста до следующего заголовка; MANUAL: релевантность по смыслу."
          severity: "error"
        - id: "MAIN-04"
          description: "В основной части сформулированы критерии выполнения/контроля (если применимо к типу СТО)."
          required: false
          check: "AUTO: поиск маркеров контроля ('контроль', 'критерии', 'проверка', 'оценка'); MANUAL: подтверждение применимости."
          severity: "warning"
        - id: "MAIN-05"
          description: "Если в документе есть таблицы, на каждую таблицу есть ссылка в тексте."
          required: true
          check: "AUTO: для каждой метки 'Таблица N' найдено упоминание в соседних абзацах."
          severity: "error"
        - id: "MAIN-06"
          description: "Если в документе есть рисунки/схемы, на каждое изображение есть ссылка в тексте."
          required: true
          check: "AUTO: для каждого 'Рисунок/Схема/Блок-схема' найдено текстовое упоминание."
          severity: "warning"
        - id: "MAIN-07"
          description: "Ссылки на приложения в основной части соответствуют существующим приложениям."
          required: true
          check: "AUTO: извлечь все ссылки 'приложение X' и проверить, что приложение X существует."
          severity: "error"
        - id: "MAIN-08"
          description: "Неиспользуемые приложения отсутствуют или явно обоснованы."
          required: false
          check: "AUTO: проверить, что каждое приложение имеет хотя бы одну ссылку из тела; MANUAL: зафиксировать допустимые исключения."
          severity: "warning"
        - id: "MAIN-09"
          description: "Маркированные и нумерованные перечни оформлены единообразно."
          required: true
          check: "AUTO: внутри одного уровня перечня одинаковый маркер/стиль; нет конфликтов нумерации."
          severity: "warning"
        - id: "MAIN-10"
          description: "Внутренние кросс-ссылки на разделы/пункты валидны."
          required: true
          check: "AUTO: каждая ссылка на пункт (например, 7.3.2) существует в дереве структуры."
          severity: "error"

    - name: "Отчетные документы"
      items:
        - id: "REP-01"
          description: "Раздел «Отчетные документы» присутствует."
          required: true
          check: "AUTO: найден заголовок 'Отчетные документы'."
          severity: "error"
        - id: "REP-02"
          description: "Раздел представлен в табличной форме или эквивалентной структуре строк."
          required: true
          check: "AUTO: в разделе обнаружена таблица/структурированный список записей."
          severity: "error"
        - id: "REP-03"
          description: "Для каждой записи указано наименование документа."
          required: true
          check: "AUTO: в каждой строке таблицы заполнена колонка/поле наименования."
          severity: "error"
        - id: "REP-04"
          description: "Для каждой записи указаны ответственный и место хранения."
          required: true
          check: "AUTO: в каждой строке заполнены поля ответственного и хранения."
          severity: "error"
        - id: "REP-05"
          description: "Для каждой записи указан срок хранения."
          required: true
          check: "AUTO: в каждой строке заполнено поле срока хранения."
          severity: "error"
        - id: "REP-06"
          description: "Структура раздела отчетных документов согласована с формой, принятой в СТО 001 (приложение Г)."
          required: true
          check: "AUTO: в заголовках таблицы присутствуют обязательные поля (наименование, ответственный, место/срок хранения)."
          severity: "error"

    - name: "Ответственность"
      items:
        - id: "RESP-01"
          description: "Раздел «Ответственность» присутствует."
          required: true
          check: "AUTO: найден заголовок 'Ответственность'."
          severity: "error"
        - id: "RESP-02"
          description: "В разделе определены роли/должности и соответствующие зоны ответственности."
          required: true
          check: "AUTO: для каждой обнаруженной роли найдено >=1 подпункта ответственности."
          severity: "error"
        - id: "RESP-03"
          description: "Ответственность не противоречит структуре процессов, описанных в основной части."
          required: true
          check: "AUTO: ключевые роли из основной части встречаются в разделе ответственности; MANUAL: семантическая сверка."
          severity: "warning"
        - id: "RESP-04"
          description: "Формулировки ответственности конкретны и проверяемы."
          required: false
          check: "AUTO: обнаружены глаголы действия и объекты ответственности в формулировках."
          severity: "info"

    - name: "Приложения"
      items:
        - id: "APP-01"
          description: "В документе присутствует как минимум одно приложение, если на него есть ссылка в тексте."
          required: true
          check: "AUTO: при наличии ссылок 'приложение X' существует раздел 'Приложение X'."
          severity: "error"
        - id: "APP-02"
          description: "Приложения обозначены буквами (А, Б, В...) и нумеруются последовательно."
          required: true
          check: "AUTO: извлечь буквы приложений и проверить последовательность без дубликатов."
          severity: "error"
        - id: "APP-03"
          description: "У каждого приложения указан статус: обязательное, рекомендуемое или справочное."
          required: true
          check: "AUTO: в заголовке/подзаголовке приложения найден один из допустимых статусов."
          severity: "error"
        - id: "APP-04"
          description: "В содержании отражены все приложения с корректными названиями."
          required: true
          check: "AUTO: список приложений в TOC совпадает со списком фактических приложений."
          severity: "error"
        - id: "APP-05"
          description: "Каждое приложение начинается с новой страницы."
          required: true
          check: "AUTO: начало каждого блока 'Приложение X' совпадает с началом страницы."
          severity: "warning"
        - id: "APP-06"
          description: "В тексте документа есть ссылки на все приложения."
          required: true
          check: "AUTO: каждое приложение имеет хотя бы одно упоминание в теле документа."
          severity: "warning"
        - id: "APP-07"
          description: "В ссылках на приложения используется нормативная форма («в соответствии с приложением ...» / «приведен в приложении ...»)."
          required: false
          check: "AUTO: поиск шаблонов ссылочной формулировки; MANUAL: оценка стилистической корректности."
          severity: "info"
        - id: "APP-08"
          description: "Порядок приложений соответствует порядку их первого упоминания в тексте."
          required: true
          check: "AUTO: сравнить порядок первых ссылок на приложения с порядком их размещения."
          severity: "warning"
        - id: "APP-09"
          description: "Для каждого приложения присутствует заголовок с идентификатором («Приложение А/Б/...») и наименованием."
          required: true
          check: "AUTO: каждый блок приложения содержит маркер 'Приложение <буква>' и непустой заголовок."
          severity: "error"
        - id: "APP-10"
          description: "Статус приложения (обязательное/рекомендуемое/справочное) указан в явном виде для каждого приложения."
          required: true
          check: "AUTO: для каждого приложения найден статус из допустимого словаря."
          severity: "error"
        - id: "APP-11"
          description: "Обозначения приложений не используют запрещенные/неконсистентные символы."
          required: true
          check: "AUTO: идентификатор приложения соответствует шаблону кириллической буквы/последовательности без спецсимволов."
          severity: "warning"
        - id: "APP-12"
          description: "Если приложение содержит таблицы/формы, они имеют заголовки и структурно читаемы."
          required: true
          check: "AUTO: в каждом приложении с таблицами у таблиц есть подписи или заголовки."
          severity: "warning"
        - id: "APP-13"
          description: "В приложениях отсутствуют пустые шаблонные блоки без содержания (кроме допустимых бланков форм)."
          required: false
          check: "AUTO: обнаружение блоков с пустыми абзацами/плейсхолдерами; MANUAL: подтверждение, что это допустимый бланк."
          severity: "info"
        - id: "APP-14"
          description: "Ссылки из приложений обратно в основной текст корректны (если присутствуют)."
          required: false
          check: "AUTO: внутренние ссылки на пункты основной части резолвятся в существующие номера."
          severity: "warning"

    - name: "Лист регистрации изменений"
      items:
        - id: "CHG-01"
          description: "Лист регистрации изменений присутствует."
          required: true
          check: "AUTO: найден заголовок 'Лист регистрации изменений'."
          severity: "error"
        - id: "CHG-02"
          description: "Лист содержит табличную структуру для фиксации изменений."
          required: true
          check: "AUTO: в разделе обнаружена таблица."
          severity: "error"
        - id: "CHG-03"
          description: "В таблице присутствуют ключевые поля: номер изменения/извещения, дата, подпись."
          required: true
          check: "AUTO: в заголовках колонок обнаружены семантически эквивалентные поля."
          severity: "error"
        - id: "CHG-04"
          description: "Лист оформлен в форме, соответствующей СТО 001 (приложение Д)."
          required: true
          check: "AUTO: набор обязательных колонок и структура таблицы соответствуют профилю формы приложения Д."
          severity: "warning"
        - id: "CHG-05"
          description: "На листе идентифицировано обозначение текущего СТО."
          required: true
          check: "AUTO: на листе есть код СТО документа."
          severity: "warning"
        - id: "CHG-06"
          description: "Лист регистрации изменений содержит строки для новых, замененных, аннулированных листов."
          required: true
          check: "AUTO: в заголовках/подзаголовках таблицы найдены поля новых/замененных/аннулированных листов."
          severity: "warning"
        - id: "CHG-07"
          description: "Нумерация изменений монотонно возрастает (1,2,3...) без дублей."
          required: false
          check: "AUTO: значения номера изменения уникальны и отсортированы по возрастанию."
          severity: "warning"
        - id: "CHG-08"
          description: "Для каждой записи изменения указана дата внесения."
          required: true
          check: "AUTO: каждая заполненная строка таблицы имеет валидную дату."
          severity: "error"
        - id: "CHG-09"
          description: "Для утвержденной версии отсутствуют частично заполненные строки в таблице изменений."
          required: true
          check: "AUTO: нет строк, где заполнено менее 50% обязательных колонок."
          severity: "warning"
        - id: "CHG-10"
          description: "Лист регистрации изменений расположен перед листом ознакомления."
          required: true
          check: "AUTO: индекс секции 'Лист регистрации изменений' меньше индекса 'Лист ознакомления'."
          severity: "error"

    - name: "Лист ознакомления"
      items:
        - id: "ACK-01"
          description: "Лист ознакомления присутствует."
          required: true
          check: "AUTO: найден заголовок 'Лист ознакомления'."
          severity: "error"
        - id: "ACK-02"
          description: "Лист содержит табличную форму с полями ФИО, должность, подпись, дата."
          required: true
          check: "AUTO: найдены соответствующие колонки или их эквиваленты."
          severity: "error"
        - id: "ACK-03"
          description: "В заголовке листа указано, с каким СТО выполняется ознакомление."
          required: true
          check: "AUTO: на листе присутствует обозначение СТО."
          severity: "warning"
        - id: "ACK-04"
          description: "Лист оформлен в форме, соответствующей СТО 001 (приложение Е)."
          required: true
          check: "AUTO: структура колонок соответствует профилю формы приложения Е."
          severity: "warning"
        - id: "ACK-05"
          description: "Лист допускает заполнение под подпись для всех затронутых сотрудников."
          required: false
          check: "AUTO: количество доступных строк/ячеек не меньше минимального порога для подразделения."
          severity: "info"
        - id: "ACK-06"
          description: "В листе ознакомления присутствует порядковая нумерация строк."
          required: true
          check: "AUTO: первая колонка содержит последовательные номера строк."
          severity: "warning"
        - id: "ACK-07"
          description: "Для каждой заполненной строки присутствуют подпись и дата ознакомления."
          required: true
          check: "AUTO: если указано ФИО, то поля подписи и даты не пусты."
          severity: "error"
        - id: "ACK-08"
          description: "Формат даты в листе ознакомления унифицирован."
          required: false
          check: "AUTO: даты соответствуют одному из допустимых форматов (ДД.ММ.ГГГГ или YYYY-MM-DD)."
          severity: "info"
        - id: "ACK-09"
          description: "Лист ознакомления расположен после листа регистрации изменений."
          required: true
          check: "AUTO: индекс секции 'Лист ознакомления' больше индекса секции 'Лист регистрации изменений'."
          severity: "error"
        - id: "ACK-10"
          description: "В листе ознакомления нет дублирующихся записей по одному сотруднику и дате."
          required: false
          check: "AUTO: уникальность пары (ФИО, дата) в заполненных строках."
          severity: "warning"

    - name: "Лист согласования"
      items:
        - id: "AGR-01"
          description: "Лист согласования присутствует."
          required: true
          check: "AUTO: найден заголовок 'Лист согласования' или таблица 'СОГЛАСОВАНО'."
          severity: "error"
        - id: "AGR-02"
          description: "Лист согласования размещен последним листом документа."
          required: true
          check: "AUTO: лист согласования находится после листа ознакомления и является последним структурным блоком."
          severity: "error"
        - id: "AGR-03"
          description: "Лист содержит табличные поля для должности, ФИО, подписи и даты."
          required: true
          check: "AUTO: в таблице согласования обнаружены ключевые колонки."
          severity: "error"
        - id: "AGR-04"
          description: "Состав согласующих ролей соответствует типу документа и корпоративной практике."
          required: false
          check: "AUTO: найден минимум обязательный набор ролей согласования; MANUAL: проверить расширенный состав при необходимости."
          severity: "warning"
        - id: "AGR-05"
          description: "Для утвержденной версии отсутствуют незаполненные критичные поля согласования."
          required: true
          check: "AUTO: для статуса approved/active нет пустых обязательных ячеек."
          severity: "warning"
        - id: "AGR-06"
          description: "В листе согласования присутствует явный маркер «СОГЛАСОВАНО»."
          required: true
          check: "AUTO: найден текст 'СОГЛАСОВАНО' (с учетом варианта с пробелами между буквами)."
          severity: "error"
        - id: "AGR-07"
          description: "Каждая строка согласования содержит роль/должность согласующего."
          required: true
          check: "AUTO: в каждой строке таблицы согласования заполнена колонка должности."
          severity: "error"
        - id: "AGR-08"
          description: "Для каждой заполненной строки согласования указана дата."
          required: true
          check: "AUTO: если заполнено ФИО/подпись, дата обязательна."
          severity: "error"
        - id: "AGR-09"
          description: "Лист согласования не содержит дубликатов ролей без обоснования."
          required: false
          check: "AUTO: уникальность названий ролей в таблице согласования."
          severity: "warning"
        - id: "AGR-10"
          description: "Лист согласования следует после листа ознакомления и завершает документ."
          required: true
          check: "AUTO: последние разделы документа имеют порядок: регистрация изменений -> ознакомление -> согласование."
          severity: "error"

    - name: "Общее оформление документа"
      items:
        - id: "FMT-01"
          description: "Все обязательные разделы документа присутствуют в требуемом порядке."
          required: true
          check: "AUTO: валидировать последовательность разделов по профилю СТО 001."
          severity: "error"
        - id: "FMT-02"
          description: "Нумерация страниц сквозная, арабскими цифрами, кроме титульного листа."
          required: true
          check: "AUTO: проверить номера страниц с исключением первой страницы."
          severity: "error"
        - id: "FMT-03"
          description: "Верхний колонтитул (регистрационный номер) присутствует на рабочих страницах и отсутствует на титульной."
          required: true
          check: "AUTO: анализ колонтитулов по страницам."
          severity: "error"
        - id: "FMT-04"
          description: "Поля страницы соответствуют требованиям: справа >=10 мм, остальные >=20 мм."
          required: true
          check: "AUTO: прочитать page setup и проверить: left=20мм, right=10мм, top=20мм, bottom=20мм (допуск ±1мм)."
          severity: "error"
        - id: "FMT-05"
          description: "Межстрочный интервал соответствует 1.15."
          required: true
          check: "AUTO: проверить paragraph spacing/line spacing в DOCX стилях."
          severity: "error"
        - id: "FMT-06"
          description: "Абзацный отступ единообразен и соответствует 5 знакам (норматив СТО 001)."
          required: true
          check: "AUTO: проверить first-line indent по стилям абзацев (эквивалент 5 знакам для применяемого шрифта)."
          severity: "error"
        - id: "FMT-07"
          description: "Заголовки разделов и подразделов оформлены единообразно и выделены полужирным."
          required: true
          check: "AUTO: проверить стили заголовков (bold=true, единый style family)."
          severity: "error"
        - id: "FMT-08"
          description: "Нумерация разделов использует арабские цифры без точки после номера раздела."
          required: true
          check: "AUTO: regex для заголовков '^\\d+(\\.\\d+)*\\s+[^.]' и контроль отсутствия точки сразу после номера."
          severity: "error"
        - id: "FMT-09"
          description: "Таблицы оформлены по правилам СТО 001: подпись «Таблица N», корректные заголовки, единообразие."
          required: true
          check: "AUTO: распознать маркеры таблиц, заголовки и подписи; проверить единый формат подписи."
          severity: "warning"
        - id: "FMT-10"
          description: "Документ не содержит явных артефактов черновика (служебные пометки, незаполненные ключевые реквизиты, конфликтующие версии)."
          required: true
          check: "AUTO: поиск маркеров 'TODO', 'черновик', '___', '[заполнить]'."
          severity: "warning"
        - id: "FMT-11"
          description: "Основной шрифт документа — Times New Roman."
          required: true
          check: "AUTO: в стилях Normal/Body Text установлен шрифт 'Times New Roman'."
          severity: "error"
        - id: "FMT-12"
          description: "Размер основного шрифта — 13 pt или 14 pt."
          required: true
          check: "AUTO: размер шрифта основного текста равен 13pt или 14pt."
          severity: "error"
        - id: "FMT-13"
          description: "Выравнивание основного текста — по ширине."
          required: true
          check: "AUTO: большинство абзацев основного текста имеют alignment='justify'."
          severity: "warning"
        - id: "FMT-14"
          description: "Заголовки не заканчиваются точкой."
          required: true
          check: "AUTO: для всех заголовков разделов/подразделов последний символ не '.'."
          severity: "error"
        - id: "FMT-15"
          description: "После номера раздела/подраздела отсутствует точка и присутствует пробел."
          required: true
          check: "AUTO: заголовки соответствуют regex '^\\d+(\\.\\d+)*\\s+\\S'."
          severity: "error"
        - id: "FMT-16"
          description: "Интервалы до/после абзаца не нарушают единый стиль документа."
          required: true
          check: "AUTO: spacing before/after абзацев соответствует базовому стилю (допуск по профилю)."
          severity: "warning"
        - id: "FMT-17"
          description: "Колонтитул содержит регистрационный номер СТО на рабочих страницах."
          required: true
          check: "AUTO: в верхнем колонтитуле страниц 2+ найден regex номера СТО."
          severity: "error"
        - id: "FMT-18"
          description: "Титульный лист не содержит ни номера страницы, ни колонтитула."
          required: true
          check: "AUTO: первая страница имеет пустые header/footer поля и отсутствие page number field."
          severity: "error"
